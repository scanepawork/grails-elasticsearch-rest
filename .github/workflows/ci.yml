name: "CI"
on:
  push:
    branches:
      - master
      - '[4-9]+.[0-9]+.x'
  pull_request:
    branches:
      - master
      - '[4-9]+.[0-9]+.x'

permissions:
  contents: read

jobs:
  build:
    name: 'Build (Java ${{ matrix.java }})'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 21 ]
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: ${{ matrix.java }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
      - name: "🔨 Build project"
        run: ./gradlew build --continue --stacktrace

  publish-snapshot:
    name: 'Publish Snapshot'
    needs: [ build ]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 17
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
      - name: "📤 Publish Snapshot to GitHub Packages"
        run: ./gradlew publish
        env:
          GRAILS_PUBLISH_RELEASE: 'false'
          MAVEN_PUBLISH_URL: 'https://maven.pkg.github.com/${{ github.repository }}'
          MAVEN_PUBLISH_USERNAME: ${{ github.actor }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}